name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install hatch
        run: pip install hatch

      - name: Run tests
        run: hatch run test

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
